<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUÉT NHỜ</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      font-family:Arial,sans-serif;
    }

    .box{
      text-align:center;
    }

    h1{
      color:white;
      margin-bottom:30px;
      font-size:40px;
      letter-spacing:2px;
    }

    button{
      padding:16px 40px;
      font-size:22px;
      border:none;
      border-radius:14px;
      background:#00bfff;
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#0099cc;
      transform:scale(1.05);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>QUÉT NHỜ</h1>

    <button onclick="openWeb()">
      MỞ WEB
    </button>
  </div>

  <script>
    function openWeb() {
      window.location.href = "https://proxyvip.click";
    }
  </script>

</body>
</html>
